function ST({children,ac}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18,marginTop:30}}>
      <div style={{width:3,height:18,borderRadius:2,background:ac||OR,flexShrink:0}}/>

      <div style={{flex:1,height:1,background:`linear-gradient(90deg,${ac||OR}30,transparent)`}}/>
    </div>
  );
}

const LBL={display:"block",fontSize:10,fontWeight:900,color:"#9c9490",textTransform:"uppercase",letterSpacing:"0.12em",marginBottom:7};
const INP_S={width:"100%",padding:"13px 16px",border:"1.5px solid #e5e0d8",borderRadius:13,fontSize:14,color:"#111",background:"#fff",outline:"none",fontFamily:"'Nunito',sans-serif",boxSizing:"border-box",transition:"border-color .2s,box-shadow .2s",fontWeight:600};

function F({label,name,val,set,type="text",ph=""}){
  return <div style={{marginBottom:16}}>
    <label style={LBL}>{label}</label>
    <input type={type} value={val} onChange={e=>set(name,e.target.value)} placeholder={ph} style={INP_S}
      onFocus={e=>{e.target.style.borderColor=OR;e.target.style.boxShadow=`0 0 0 4px ${OR}18`;}}
      onBlur={e=>{e.target.style.borderColor="#e5e0d8";e.target.style.boxShadow="none";}}/>
  </div>;
}
function TA({label,name,val,set,rows=3,ph=""}){
  return <div style={{marginBottom:16}}>
    <label style={LBL}>{label}</label>
    <textarea value={val} onChange={e=>set(name,e.target.value)} rows={rows} placeholder={ph}
      style={{...INP_S,resize:"vertical"}}
      onFocus={e=>{e.target.style.borderColor=OR;e.target.style.boxShadow=`0 0 0 4px ${OR}18`;}}
      onBlur={e=>{e.target.style.borderColor="#e5e0d8";e.target.style.boxShadow="none";}}/>
  </div>;
}
function G2({children}){return <div className="g2">{children}</div>;}
function YN({label,name,val,set}){
  return <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 0",borderBottom:"1px solid #ede9e2"}}>
    <span style={{fontSize:14,color:"#444",flex:1,paddingRight:18,lineHeight:1.55,fontWeight:600}}>{label}</span>
    <div style={{display:"flex",gap:7,flexShrink:0}}>
      {["Sí","No"].map(o=><button key={o} onClick={()=>set(name,o)}
        style={{padding:"8px 20px",borderRadius:10,fontSize:12,fontWeight:900,cursor:"pointer",
          background:val===o?(o==="Sí"?OR:DK):"#f7f5f2",
          color:val===o?"#fff":"#999",
          border:`1.5px solid ${val===o?(o==="Sí"?OR:DK):"#e5e0d8"}`,
          transition:"all .15s",fontFamily:"'Nunito',sans-serif",
          boxShadow:val===o?`0 4px 14px ${o==="Sí"?OR+"55":"#00000035"}`:"none"}}>{o}</button>)}
    </div>
  </div>;
}
function YNplus({label,name,val,set,fn,fv,fl="Descríbalo brevemente:"}){
  return <div>
    <YN label={label} name={name} val={val} set={set}/>
    {val==="Sí"&&<div style={{padding:"10px 0 2px 18px",borderLeft:`3px solid ${OR}`,marginTop:6,marginBottom:4}}>
      <F label={fl} name={fn} val={fv} set={set} ph="Escribe aquí..."/>
    </div>}
  </div>;
}
function Chips({label,name,val,set,opts}){
  return <div style={{marginBottom:20}}>
    {label&&<label style={LBL}>{label}</label>}
    <div style={{display:"flex",flexWrap:"wrap",gap:9}}>
      {opts.map(o=><button key={o} onClick={()=>set(name,o)}
        style={{padding:"10px 18px",borderRadius:26,fontSize:13,fontWeight:700,cursor:"pointer",
          background:val===o?OR:"#fff",
          color:val===o?"#fff":"#666",
          border:`1.5px solid ${val===o?OR:"#e5e0d8"}`,
          transition:"all .2s",fontFamily:"'Nunito',sans-serif",
          boxShadow:val===o?`0 6px 18px ${OR}45`:"0 2px 8px rgba(0,0,0,0.05)"}}>{o}</button>)}
    </div>
  </div>;
}
function Weeks({val,set}){
  const toggle=s=>{const c=val||[];set("semanasSelec",c.includes(s)?c.filter(x=>x!==s):[...c,s]);};
  return <div style={{marginBottom:20}}>
    <label style={LBL}>Selecciona las semanas</label>
    <div style={{background:"#fff",borderRadius:18,padding:20,border:"1.5px solid #e5e0d8",boxShadow:"0 4px 20px rgba(0,0,0,0.04)"}}>
      {SEMANAS.map(({mes,cols})=><div key={mes} style={{marginBottom:18}}>
        <div style={{fontSize:9,fontWeight:900,color:OR,letterSpacing:"0.18em",marginBottom:10,textTransform:"uppercase"}}>{mes}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {cols.map(s=>{const sel=(val||[]).includes(s);return(
            <button key={s} onClick={()=>toggle(s)}
              style={{padding:"8px 15px",borderRadius:10,fontSize:12,fontWeight:700,cursor:"pointer",
                background:sel?OR:"#f7f5f2",color:sel?"#fff":"#888",
                border:`1.5px solid ${sel?OR:"transparent"}`,
                transition:"all .2s",fontFamily:"'Nunito',sans-serif",
                boxShadow:sel?`0 4px 14px ${OR}40`:"none"}}>{sel?"✓ ":""}{s}</button>
          );})}
        </div>
      </div>)}
    </div>
    {(val||[]).length>0&&<div style={{marginTop:10,padding:"10px 16px",background:`${OR}10`,border:`1.5px solid ${OR}30`,borderRadius:12,fontSize:13,color:OR,fontWeight:800}}>
      ✓ {val.length} semana{val.length!==1?"s":""} seleccionada{val.length!==1?"s":""}
    </div>}
  </div>;
}
function SecAlumno({d,s}){return <><G2><F label="Nombre" name="nombre" val={d.nombre} set={s}/><F label="Apellidos" name="apellidos" val={d.apellidos} set={s}/></G2><G2><F label="Fecha de nacimiento" name="fechaNac" val={d.fechaNac} set={s} type="date"/><F label="DNI / NIE" name="dni" val={d.dni} set={s}/></G2><F label="Dirección" name="direccion" val={d.direccion} set={s}/><G2><F label="Localidad" name="localidad" val={d.localidad} set={s}/><F label="Provincia" name="provincia" val={d.provincia} set={s}/></G2><G2><F label="Código Postal" name="cp" val={d.cp} set={s}/><div/></G2><G2><F label="Correo electrónico" name="correo" val={d.correo} set={s} type="email"/><F label="Teléfono" name="telefono" val={d.telefono} set={s} type="tel"/></G2></>;}
function SecMenor({d,s}){return <><G2><F label="Nombre" name="mNombre" val={d.mNombre} set={s}/><F label="Apellidos" name="mApellidos" val={d.mApellidos} set={s}/></G2><G2><F label="DNI / NIE" name="mDni" val={d.mDni} set={s}/><F label="Fecha de nacimiento" name="mFechaNac" val={d.mFechaNac} set={s} type="date"/></G2><G2><F label="Dirección" name="mDireccion" val={d.mDireccion} set={s}/><F label="Población" name="mPoblacion" val={d.mPoblacion} set={s}/></G2></>;}
function SecTutor({d,s}){return <><G2><F label="Nombre tutor/a" name="tNombre" val={d.tNombre} set={s}/><F label="Apellidos" name="tApellidos" val={d.tApellidos} set={s}/></G2><G2><F label="Fecha nacimiento" name="tFechaNac" val={d.tFechaNac} set={s} type="date"/><F label="DNI / NIE" name="tDni" val={d.tDni} set={s}/></G2><F label="Dirección" name="tDireccion" val={d.tDireccion} set={s}/><G2><F label="Localidad" name="tLocalidad" val={d.tLocalidad} set={s}/><F label="Provincia" name="tProvincia" val={d.tProvincia} set={s}/></G2><G2><F label="Código Postal" name="tCp" val={d.tCp} set={s}/><div/></G2><G2><F label="Correo electrónico" name="tCorreo" val={d.tCorreo} set={s} type="email"/><F label="Teléfono" name="tTelefono" val={d.tTelefono} set={s} type="tel"/></G2><F label="Emergencia — avisar a:" name="emergencia" val={d.emergencia} set={s} ph="Nombre y teléfono"/></>;}
function SecActividad({d,s}){return <><Chips label="Actividad" name="actividadTipo" val={d.actividadTipo} set={s} opts={["Pádel","Tenis","Natación","Pilates","Fit Training","Baile","Entren. Personal","Zumba","Yoga"]}/><G2><F label="Días" name="diasActividad" val={d.diasActividad} set={s} ph="Lun, Mié..."/><F label="Horario" name="horario" val={d.horario} set={s} ph="10:00–11:00"/></G2><div style={{marginBottom:18}}><label style={LBL}>Nivel del 1 al 5</label><div style={{display:"flex",gap:10}}>{[1,2,3,4,5].map(n=><button key={n} onClick={()=>s("nivelActividad",""+n)} style={{width:50,height:50,borderRadius:14,fontSize:16,fontWeight:900,cursor:"pointer",background:d.nivelActividad===String(n)?OR:"#fff",color:d.nivelActividad===String(n)?"#fff":"#ccc",border:`1.5px solid ${d.nivelActividad===String(n)?OR:"#e5e0d8"}`,transition:"all .2s",fontFamily:"'Nunito',sans-serif",boxShadow:d.nivelActividad===String(n)?`0 6px 18px ${OR}50`:"0 2px 8px rgba(0,0,0,0.05)"}}>{n}</button>)}</div></div><TA label="Observaciones / Historial / Lesiones" name="obsActividad" val={d.obsActividad} set={s} rows={3}/></>;}
function SecMedAdulto({d,s}){return <><YNplus label="¿Tiene alguna lesión ósea?" name="lesionOsea" val={d.lesionOsea} set={s} fn="descLesionOsea" fv={d.descLesionOsea}/><YNplus label="¿Tiene alguna lesión muscular?" name="lesionMuscular" val={d.lesionMuscular} set={s} fn="descLesionMuscular" fv={d.descLesionMuscular}/><YNplus label="¿Padece enfermedad cardiovascular?" name="cardiovascular" val={d.cardiovascular} set={s} fn="descCardiovascular" fv={d.descCardiovascular}/><YNplus label="¿Se asfixia haciendo ejercicio?" name="asfixia" val={d.asfixia} set={s} fn="descAsfixia" fv={d.descAsfixia}/><YNplus label="¿Toma alguna medicación?" name="medicacion" val={d.medicacion} set={s} fn="descMedicacion" fv={d.descMedicacion} fl="Especifique:"/><YNplus label="¿Su médico le ha dado pautas para el ejercicio?" name="pautaMedico" val={d.pautaMedico} set={s} fn="descPauta" fv={d.descPauta} fl="Especifique:"/><YN label="¿Padece alguna alergia?" name="alergia" val={d.alergia} set={s}/><YN label="¿Está embarazada o podría estarlo?" name="embarazada" val={d.embarazada} set={s}/><YN label="¿Es fumador/a?" name="fumador" val={d.fumador} set={s}/><div style={{height:8}}/>{[["asma","Asma"],["diabetes","Diabetes"],["epilepsia","Epilepsia"],["anemia","Anemia"],["hipertension","Hipertensión"],["osteoporosis","Osteoporosis"]].map(([k,l])=><YN key={k} label={l} name={k} val={d[k]} set={s}/>)}<TA label="Observaciones" name="obsPatologias" val={d.obsPatologias} set={s} rows={2}/><div style={{height:8}}/>{[["mareos","Mareos al esfuerzo"],["desmayos","Desmayos / lipotimias"],["nauseas","Náuseas"],["difRespirar","Dificultad para respirar"]].map(([k,l])=><YN key={k} label={l} name={k} val={d[k]} set={s}/>)}<TA label="Observaciones generales" name="obsSalud" val={d.obsSalud} set={s} rows={2}/></>;}
function SecMedMenor({d,s}){return <><p style={{fontSize:14,color:"#666",marginBottom:16,lineHeight:1.65,fontWeight:600}}>Indique si el menor presenta alguna enfermedad, alergia o patología de importancia:</p><Chips label="" name="tienePatologia" val={d.tienePatologia} set={s} opts={["Sí presenta","No presenta"]}/>{d.tienePatologia==="Sí presenta"&&<><TA label="Patología / alergia y características" name="patologiaDesc" val={d.patologiaDesc} set={s} rows={3}/><TA label="Tratamiento y medidas" name="tratamientoMenor" val={d.tratamientoMenor} set={s} rows={2}/><F label="Medicación actual" name="medicaMenor" val={d.medicaMenor} set={s}/><TA label="Otros datos de interés" name="otrosDatos" val={d.otrosDatos} set={s} rows={2}/></>}</>;}
function SecImagenes({d,s,menor}){return <><p style={{fontSize:14,color:"#666",marginBottom:16,lineHeight:1.65,fontWeight:600}}>{menor?"Como padre/madre/tutor legal, autorizo a":"Autorizo a"} ACTIFIT a fotografiar y/o grabar vídeos de las actividades y publicarlos con fines educativos y promocionales.</p><Chips label="" name="autorizaImagenes" val={d.autorizaImagenes} set={s} opts={["✓ Sí, autorizo","✗ No autorizo"]}/></>;}
function SecPago({d,s,concepto}){return <><Chips label="Método de pago" name="metodoPago" val={d.metodoPago} set={s} opts={["Transferencia bancaria","Metálico","Domiciliación bancaria"]}/>{d.metodoPago==="Transferencia bancaria"&&<div style={{background:`linear-gradient(135deg,#fff8f5,#fff)`,border:`1.5px solid ${OR}25`,borderRadius:18,padding:22,fontSize:14,lineHeight:2.2,color:"#444",marginTop:10,boxShadow:`0 8px 32px ${OR}12`}}><div style={{fontWeight:900,color:OR,marginBottom:8,fontSize:10,textTransform:"uppercase",letterSpacing:"0.16em"}}>Datos bancarios</div>IBAN: <strong>ES14 0081 0650 3100 0157 2868</strong><br/>Beneficiario: <strong>ACTIFIT S.L.</strong><br/>Concepto: <strong>"{concepto}"</strong></div>}{d.metodoPago==="Domiciliación bancaria"&&<F label="IBAN" name="ibanDomiciliacion" val={d.ibanDomiciliacion} set={s} ph="ES00 0000 0000 0000 0000 0000"/>}</>;}

const PASOS={
  entrenamiento:["Datos","Entreno","Objetivos","Deporte","Salud","Resumen"],
  deportiva_adulto:["Datos","Actividad","Salud","Imágenes","Pago","Resumen"],
  deportiva_menor:["Menor","Tutor","Actividad","Salud","Imágenes","Pago","Resumen"],
  natacion_adulto:["Datos","Urb.","Semanas","Salud","Imágenes","Pago","Resumen"],
  natacion_menor:["Menor","Tutor","Semanas","Salud","Imágenes","Pago","Resumen"],
  verano_menor:["Menor","Tutor","Semanas","Salud","Imágenes","Pago","Resumen"],
};

function Paso({type,step,d,s,ac}){
  const meta=FORMS.find(f=>f.id===type)||{};
  const concepto=`${meta.title||type} / ${d.urbanizacion||d.nombre||d.mNombre||""}`;
  if(type==="entrenamiento"){
    if(step===0)return <><ST ac={ac}>Datos Personales</ST><F label="Nombre completo" name="nombre" val={d.nombre} set={s}/><G2><F label="Fecha de nacimiento" name="fechaNac" val={d.fechaNac} set={s} type="date"/><F label="DNI / NIE" name="dni" val={d.dni} set={s}/></G2><div style={{marginBottom:18}}><label style={LBL}>Sexo</label><div style={{display:"flex",gap:10}}>{["Masculino","Femenino"].map(v=><button key={v} onClick={()=>s("sexo",v)} style={{padding:"12px 28px",borderRadius:13,fontSize:14,fontWeight:800,cursor:"pointer",border:`1.5px solid ${d.sexo===v?OR:"#e5e0d8"}`,background:d.sexo===v?OR:"#fff",color:d.sexo===v?"#fff":"#999",transition:"all .2s",fontFamily:"'Nunito',sans-serif",boxShadow:d.sexo===v?`0 6px 18px ${OR}45`:"0 2px 8px rgba(0,0,0,0.05)"}}>{v}</button>)}</div></div><G2><F label="Peso (kg)" name="peso" val={d.peso} set={s} ph="70"/><F label="Altura (cm)" name="altura" val={d.altura} set={s} ph="175"/></G2><F label="Profesión" name="profesion" val={d.profesion} set={s}/><ST ac={ac}>Contacto</ST><F label="Dirección" name="direccion" val={d.direccion} set={s}/><G2><F label="Localidad" name="localidad" val={d.localidad} set={s}/><F label="Municipio" name="municipio" val={d.municipio} set={s}/></G2><G2><F label="Código Postal" name="cp" val={d.cp} set={s}/><F label="Nacionalidad" name="nacionalidad" val={d.nacionalidad} set={s}/></G2><G2><F label="Teléfono" name="telefono" val={d.telefono} set={s} type="tel"/><F label="Correo" name="correo" val={d.correo} set={s} type="email"/></G2></>;
    if(step===1)return <><ST ac={ac}>Tipo de Entrenamiento</ST><Chips label="Modalidad" name="tipoEntren" val={d.tipoEntren} set={s} opts={["Individual","Dúo","Pequeño grupo","Online"]}/><G2><F label="Nº miembros" name="numMiembros" val={d.numMiembros} set={s} ph="ej. 2"/><F label="Lugar" name="lugarEntren" val={d.lugarEntren} set={s} ph="Gimnasio, parque..."/></G2><G2><F label="Días / semana" name="diasSemana" val={d.diasSemana} set={s} ph="ej. 3"/><F label="Días específicos" name="diasEsp" val={d.diasEsp} set={s} ph="Lun, Mié, Vie"/></G2><F label="Entrenador/a" name="entrenador" val={d.entrenador} set={s}/></>;
    if(step===2)return <><ST ac={ac}>Objetivos</ST><Chips label="Objetivo principal" name="objPrincipal" val={d.objPrincipal} set={s} opts={["Pérdida de peso","Ganancia muscular","Mejora cardiovascular","Rehabilitación","Rendimiento","Bienestar"]}/><F label="Preferencia" name="prefObj" val={d.prefObj} set={s} ph="ej. Más fuerza que cardio"/><TA label="Observaciones" name="obsObj" val={d.obsObj} set={s} rows={3}/></>;
    if(step===3)return <><ST ac={ac}>Información Deportiva</ST><TA label="Experiencia deportiva previa" name="expDeportiva" val={d.expDeportiva} set={s} rows={3}/><TA label="Actividades que te gustan" name="actFisicas" val={d.actFisicas} set={s} rows={2}/><TA label="Instalaciones disponibles" name="instalaciones" val={d.instalaciones} set={s} rows={2}/><TA label="Material disponible" name="material" val={d.material} set={s} rows={2}/></>;
    if(step===4)return <><ST ac={ac}>Ficha Médica</ST><SecMedAdulto d={d} s={s}/></>;
    if(step===5)return <Resumen d={d} type={type} ac={ac}/>;
  }
  if(type==="deportiva_adulto"){if(step===0)return <><ST ac={ac}>Urbanización y Datos</ST><F label="Urbanización / Dirección" name="urbanizacion" val={d.urbanizacion} set={s}/><SecAlumno d={d} s={s}/></>;if(step===1)return <><ST ac={ac}>Actividad</ST><SecActividad d={d} s={s}/></>;if(step===2)return <><ST ac={ac}>Ficha Médica</ST><SecMedAdulto d={d} s={s}/></>;if(step===3)return <><ST ac={ac}>Uso de Imágenes</ST><SecImagenes d={d} s={s} menor={false}/></>;if(step===4)return <><ST ac={ac}>Forma de Pago</ST><SecPago d={d} s={s} concepto={concepto}/></>;if(step===5)return <Resumen d={d} type={type} ac={ac}/>;}
  if(type==="deportiva_menor"){if(step===0)return <><ST ac={ac}>Urbanización y Menor</ST><F label="Urbanización / Dirección" name="urbanizacion" val={d.urbanizacion} set={s}/><SecMenor d={d} s={s}/></>;if(step===1)return <><ST ac={ac}>Tutor / Responsable</ST><SecTutor d={d} s={s}/></>;if(step===2)return <><ST ac={ac}>Actividad</ST><SecActividad d={d} s={s}/></>;if(step===3)return <><ST ac={ac}>Ficha Médica</ST><SecMedMenor d={d} s={s}/></>;if(step===4)return <><ST ac={ac}>Uso de Imágenes</ST><SecImagenes d={d} s={s} menor/></>;if(step===5)return <><ST ac={ac}>Forma de Pago</ST><SecPago d={d} s={s} concepto={concepto}/></>;if(step===6)return <Resumen d={d} type={type} ac={ac}/>;}
  if(type==="natacion_adulto"){if(step===0)return <><ST ac={ac}>Datos del Alumno/a</ST><SecAlumno d={d} s={s}/></>;if(step===1)return <><ST ac={ac}>Urbanización y Emergencia</ST><F label="Nombre de la urbanización" name="urbanizacion" val={d.urbanizacion} set={s}/><F label="Emergencia — avisar a:" name="emergencia" val={d.emergencia} set={s} ph="Nombre y teléfono"/></>;if(step===2)return <><Weeks val={d.semanasSelec} set={s}/><TA label="Observaciones / Nivel de natación" name="nivelNatacion" val={d.nivelNatacion} set={s} rows={3}/></>;if(step===3)return <><ST ac={ac}>Ficha Médica</ST><SecMedAdulto d={d} s={s}/></>;if(step===4)return <><ST ac={ac}>Uso de Imágenes</ST><SecImagenes d={d} s={s} menor={false}/></>;if(step===5)return <><ST ac={ac}>Forma de Pago</ST><SecPago d={d} s={s} concepto={concepto}/></>;if(step===6)return <Resumen d={d} type={type} ac={ac}/>;}
  if(type==="natacion_menor"||type==="verano_menor"){if(step===0)return <><ST ac={ac}>Urbanización y Menor</ST><F label="Nombre de la urbanización" name="urbanizacion" val={d.urbanizacion} set={s}/><SecMenor d={d} s={s}/></>;if(step===1)return <><ST ac={ac}>Tutor / Responsable</ST><SecTutor d={d} s={s}/></>;if(step===2)return <><Weeks val={d.semanasSelec} set={s}/><TA label={type==="verano_menor"?"Observaciones (juegos, timidez...)":"Observaciones / Nivel de natación"} name="nivelNatacion" val={d.nivelNatacion} set={s} rows={3}/></>;if(step===3)return <><ST ac={ac}>Ficha Médica</ST><SecMedMenor d={d} s={s}/></>;if(step===4)return <><ST ac={ac}>Uso de Imágenes</ST><SecImagenes d={d} s={s} menor/></>;if(step===5)return <><ST ac={ac}>Forma de Pago</ST><SecPago d={d} s={s} concepto={concepto}/></>;if(step===6)return <Resumen d={d} type={type} ac={ac}/>;}
  return null;
}

function Resumen({d,type,ac}){
  const isMenor=["natacion_menor","verano_menor","deportiva_menor"].includes(type);
  const rows=type==="entrenamiento"
    ?[["Nombre",d.nombre],["Correo",d.correo],["Teléfono",d.telefono],["Modalidad",d.tipoEntren],["Objetivo",d.objPrincipal]]
    :isMenor
    ?[["Menor",`${d.mNombre} ${d.mApellidos}`],["Tutor",`${d.tNombre} ${d.tApellidos}`],["Correo",d.tCorreo],["Teléfono",d.tTelefono],["Urbanización",d.urbanizacion]]
    :[["Nombre",`${d.nombre} ${d.apellidos}`],["Correo",d.correo],["Teléfono",d.telefono],["Urbanización",d.urbanizacion],["Actividad",d.actividadTipo||d.nivelNatacion||"—"]];
  return <>
    <div style={{background:"#fff",borderRadius:20,overflow:"hidden",border:"1.5px solid #ede9e2",marginBottom:16,boxShadow:"0 8px 32px rgba(0,0,0,0.06)"}}>
      {rows.map(([k,v],i)=><div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"15px 20px",background:i%2===0?"#fff":"#faf8f5",borderBottom:"1px solid #f2ede6"}}>
        <span style={{fontSize:10,color:"#b8b0a4",fontWeight:900,textTransform:"uppercase",letterSpacing:"0.12em"}}>{k}</span>
        <span style={{fontSize:14,color:"#111",fontWeight:700,textAlign:"right",maxWidth:"65%"}}>{v||"—"}</span>
      </div>)}
    </div>
    <div style={{background:"#faf8f5",borderRadius:14,padding:16,fontSize:12,color:"#b8b0a4",lineHeight:1.8,fontWeight:600,border:"1.5px solid #ede9e2"}}>
      🔒 Datos tratados conforme a la Ley Orgánica 3/2018 (RGPD). ACTIFIT S.L. — AV. Independencia 45, San Sebastián de los Reyes.
    </div>
  </>;
}

/* ══════════════════════════════
   PORTAL
══════════════════════════════ */
function Portal({onSelect}){
  const [hov,setHov]=useState(null);
  const [open,setOpen]=useState(null);
  const handleCard=g=>{if(g.variantes.length===1)onSelect(g.variantes[0].id);else setOpen(o=>o===g.id?null:g.id);};

  return(
    <div style={{minHeight:"100vh",background:BG,overflowX:"hidden",fontFamily:"'Nunito',sans-serif"}}>
      <style>{CSS}</style>

      {/* ── NAVBAR negro ── */}
      <nav style={{background:DK,position:"sticky",top:0,zIndex:100,borderBottom:"1px solid rgba(255,255,255,0.07)"}}>
        <div className="nav-in" style={{maxWidth:1160,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:58,padding:"0 32px"}}>
          <Logo h={26} light/>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:OR,animation:"dotPulse 2.5s ease-in-out infinite"}}/>
            <span style={{fontSize:9,color:"rgba(255,255,255,0.3)",textTransform:"uppercase",letterSpacing:"0.26em",fontWeight:900}}>Inscripciones</span>
          </div>
        </div>
      </nav>

      {/* ── HERO negro con naranja ── */}
      <div className="hero-pad" style={{position:"relative",padding:"80px 32px 130px",overflow:"hidden",
        background:OR}}>
        {/* textura sutil — círculos blancos muy transparentes como en el manual */}
        <div style={{position:"absolute",inset:0,pointerEvents:"none",opacity:.06,
          backgroundImage:`radial-gradient(circle,#fff 1px,transparent 1px)`,
          backgroundSize:"28px 28px"}}/>
        {/* fade suave a color de fondo */}
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:140,
          background:`linear-gradient(transparent,${BG})`,pointerEvents:"none"}}/>

        <div style={{maxWidth:1160,margin:"0 auto",textAlign:"center",position:"relative",zIndex:1}}>
          {/* logo blanco sobre naranja */}
          <div className="fade-1" style={{display:"inline-block",marginBottom:8}}>
            <Logo h={90} light/>
          </div>
          {/* separador decorativo blanco */}
          <div className="fade-2" style={{display:"flex",alignItems:"center",gap:14,justifyContent:"center",margin:"18px auto 22px",maxWidth:300}}>
            <div style={{flex:1,height:1,background:`linear-gradient(90deg,transparent,rgba(255,255,255,0.6))`}}/>
            <div style={{width:5,height:5,borderRadius:"50%",background:"#fff",boxShadow:`0 0 10px rgba(255,255,255,0.8)`}}/>
            <div style={{flex:1,height:1,background:`linear-gradient(90deg,rgba(255,255,255,0.6),transparent)`}}/>
          </div>
          <p className="fade-3" style={{color:"rgba(255,255,255,0.82)",fontSize:14,maxWidth:360,margin:"0 auto 28px",lineHeight:2.1,fontWeight:600,letterSpacing:"0.04em"}}>
            Elige tu modalidad y completa tu inscripción en minutos
          </p>
          {/* pills de actividades — clickables */}
          <div className="fade-4" style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
            {GRUPOS.map(g=>(
              <button key={g.id} onClick={()=>{
                setOpen(g.id);
                setTimeout(()=>{
                  const el=document.getElementById(`card-${g.id}`);
                  if(el) el.scrollIntoView({behavior:"smooth",block:"center"});
                },80);
              }} style={{display:"inline-flex",alignItems:"center",gap:7,padding:"7px 16px",borderRadius:30,
                background:"rgba(255,255,255,0.18)",border:"1px solid rgba(255,255,255,0.32)",
                cursor:"pointer",fontFamily:"'Nunito',sans-serif",transition:"background .2s,transform .15s"}}
              onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.32)";e.currentTarget.style.transform="translateY(-2px)"}}
              onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.18)";e.currentTarget.style.transform="translateY(0)"}}>
                <span style={{fontSize:14}}>{g.icon}</span>
                <span style={{fontSize:11,color:"#fff",fontWeight:800}}>{g.title}</span>
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* ── CARDS sobre fondo claro ── */}
      <div className="wrap" style={{maxWidth:1160,margin:"-44px auto 0",padding:"0 32px 80px",position:"relative",zIndex:1}}>
        <div className="pg">
          {GRUPOS.map((g,gi)=>{
            const isOpen=open===g.id,multi=g.variantes.length>1,isHov=hov===g.id;
            return(
              <div id={`card-${g.id}`} key={g.id} className={`fade-${gi+1}`} style={{gridColumn:isOpen&&multi?"1/-1":"span 1"}}>
                {!(isOpen&&multi)&&(
                  <button className="card-lift" onClick={()=>handleCard(g)}
                    onMouseEnter={()=>setHov(g.id)} onMouseLeave={()=>setHov(null)}
                    style={{width:"100%",border:"none",padding:0,borderRadius:24,cursor:"pointer",
                      textAlign:"left",overflow:"hidden",display:"block",
                      background:"#fff",fontFamily:"'Nunito',sans-serif",

                                borderRadius:24,padding:"5px 14px"}}>
                                <span style={{fontSize:13}}>{v.menor?"🧒":"🧑"}</span>
                                <span style={{fontSize:12,fontWeight:800,color:v.menor?"#c47a0c":g.ac}}>{v.label}</span>

                            ))}
                            <span style={{fontSize:11,color:"#ccc",fontStyle:"italic",fontWeight:600}}>elegir abajo</span>

                            boxShadow:isHov?`0 8px 28px ${g.ac}55`:`0 4px 16px ${g.ac}35`,
                            transition:"box-shadow .25s"}}>
                            Inscribirse →
                          </div>
                        )}
                      </div>
                    </div>
                  </button>
                )}

                {isOpen&&multi&&(
                  <div style={{borderRadius:24,overflow:"hidden",
                    boxShadow:`0 20px 64px rgba(0,0,0,0.12),0 0 0 2px ${g.ac}30`,
                    fontFamily:"'Nunito',sans-serif"}}>
                    {/* header negro con glow color */}
                    <div style={{background:`linear-gradient(135deg,${DK} 0%,#1a0800 100%)`,
                      padding:"24px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",
                      borderBottom:`1px solid ${g.ac}20`}}>
                      <div style={{display:"flex",alignItems:"center",gap:18}}>
                        <div style={{width:64,height:64,borderRadius:20,
                          background:`linear-gradient(145deg,${g.ac}28,${g.ac}10)`,
                          border:`1.5px solid ${g.ac}40`,
                          display:"flex",alignItems:"center",justifyContent:"center",
                          fontSize:28,boxShadow:`0 8px 24px ${g.ac}35`}}>
                          {g.icon}
                        </div>
                        <div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.25)",textTransform:"uppercase",letterSpacing:"0.2em",fontWeight:900,marginBottom:5}}>Modalidad seleccionada</div>
                          <div style={{fontSize:20,fontWeight:900,color:"#fff",letterSpacing:"-0.02em"}}>{g.title}</div>
                        </div>
                      </div>
                      <button onClick={()=>setOpen(null)}
                        style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.12)",
                          color:"rgba(255,255,255,0.4)",cursor:"pointer",width:40,height:40,borderRadius:12,
                          fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",
                          fontFamily:"'Nunito',sans-serif",transition:"all .18s"}}
                        onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.14)";e.currentTarget.style.color="#fff";}}
                        onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.07)";e.currentTarget.style.color="rgba(255,255,255,0.4)";}}>✕</button>
                    </div>
                    {/* separador */}
                    <div style={{background:BG,padding:"11px 28px",display:"flex",alignItems:"center",gap:16}}>
                      <div style={{flex:1,height:1,background:"#ded9d0"}}/>
                      <span style={{fontSize:9,color:"#b8b0a4",fontWeight:900,textTransform:"uppercase",letterSpacing:"0.18em",whiteSpace:"nowrap"}}>¿Quién se inscribe?</span>
                      <div style={{flex:1,height:1,background:"#ded9d0"}}/>
                    </div>
                    {/* variantes */}
                    <div className="vg">
                      {g.variantes.map(v=>{
                        const hk=`${g.id}-${v.id}`,isH=hov===hk,acV=v.menor?"#d97706":g.ac;
                        return(
                          <button key={v.id} onClick={()=>onSelect(v.id)}
                            onMouseEnter={()=>setHov(hk)} onMouseLeave={()=>setHov(null)}
                            style={{background:isH?"#fff":"#faf8f5",border:"none",
                              padding:"30px 28px",textAlign:"left",cursor:"pointer",
                              transition:"background .2s",fontFamily:"'Nunito',sans-serif"}}>
                            {/* badge edad */}

                              background:v.menor?"#fff8ed":"#f0faf6",
                              border:`1.5px solid ${acV}35`,borderRadius:18,padding:"10px 18px",marginBottom:22,
                              boxShadow:`0 4px 16px ${acV}15`}}>

                              <div>
                                <div style={{fontSize:16,fontWeight:900,color:acV,lineHeight:1}}>{v.label}</div>
                                <div style={{fontSize:10,color:acV,opacity:.65,marginTop:3,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>{v.menor?"Menor de 18 años":"Mayor de 18 años"}</div>
                              </div>
                            </div>
                            <div style={{fontSize:17,fontWeight:900,color:DK,marginBottom:8,letterSpacing:"-0.01em"}}>{v.menor?"Inscripción para Menor":"Inscripción para Adulto"}</div>

                            <div className="shimmer" style={{display:"inline-flex",alignItems:"center",gap:9,
                              background:`linear-gradient(135deg,${acV},${acV}cc)`,color:"#fff",
                              borderRadius:14,padding:"12px 20px",fontSize:13,fontWeight:900,
                              transform:isH?"translateY(-3px)":"translateY(0)",

          border:"1.5px solid #ede9e2",
          boxShadow:"0 8px 40px rgba(0,0,0,0.07)"}}>
          {/* barra naranja superior */}
          <div style={{height:3,background:`linear-gradient(90deg,${OR},${OR2})`}}/>
          <div className="cbar">
            {[
              {href:"https://wa.me/34610308049",ac:"#22c55e",em:"💬",label:"WhatsApp",val:"610 30 80 49"},

                  textDecoration:"none",flex:"1 1 170px",background:"transparent",
                  fontFamily:"'Nunito',sans-serif",transition:"background .2s"}}

/* ══════════════════════════════
   WIZARD
══════════════════════════════ */
function Wizard({type,onBack}){
  const [step,setStep]=useState(0);
  const [data,setData]=useState(INIT);
  const [done,setDone]=useState(false);
  const [sending,setSending]=useState(false);
  const [sendErr,setSendErr]=useState(null);
  const set=(k,v)=>setData(d=>({...d,[k]:v}));
  const meta=FORMS.find(f=>f.id===type)||{ac:OR,gr:`linear-gradient(135deg,${OR},${OR2})`,title:type,badge:null};
  const steps=PASOS[type]||["Resumen"];
  const isLast=step===steps.length-1;
  const pct=steps.length>1?(step/(steps.length-1))*100:100;

  const handleSubmit=async()=>{
    setSending(true);setSendErr(null);
    const payload={
      tipo:type,
      modalidad:meta.title+(meta.badge?" - "+meta.badge:""),
      fecha:new Date().toLocaleDateString("es-ES"),
      ...data,
      semanas:Array.isArray(data.semanasSelec)?data.semanasSelec.join(", "):data.semanasSelec||"",
    };
    try{
      const params=new URLSearchParams({data:JSON.stringify(payload)});
      await fetch(SHEETS_URL+"?"+params.toString(),{method:"GET",mode:"no-cors"});
      setDone(true);
    }catch(e){
      setSendErr("Error de conexion. Intentalo de nuevo.");
    }finally{
      setSending(false);
    }
  };
  if(done)return(
    <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Nunito',sans-serif"}}>
      <style>{CSS}</style>
      <div style={{textAlign:"center",maxWidth:400,padding:"0 20px"}}>
        <div style={{width:96,height:96,background:meta.gr,borderRadius:28,margin:"0 auto 32px",
          display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,
          boxShadow:`0 20px 56px ${meta.ac}50`}}>✓</div>
        <h2 style={{fontSize:30,fontWeight:900,color:DK,marginBottom:12,letterSpacing:"-0.03em"}}>¡Inscripción completada!</h2>
        <p style={{color:"#9c9490",fontSize:15,lineHeight:1.75,marginBottom:36,fontWeight:600}}>Hemos registrado todos tus datos correctamente.</p>
        <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
          <button className="shimmer" onClick={onBack}
            style={{padding:"14px 26px",borderRadius:14,fontSize:14,fontWeight:800,cursor:"pointer",
              border:`1.5px solid ${meta.ac}`,background:"#fff",color:meta.ac,
              fontFamily:"'Nunito',sans-serif",boxShadow:`0 4px 16px ${meta.ac}20`}}>← Portal</button>
          <button className="shimmer" onClick={()=>{setDone(false);setStep(0);setData(INIT);}}
            style={{padding:"14px 26px",borderRadius:14,fontSize:14,fontWeight:900,cursor:"pointer",
              border:"none",background:meta.gr,color:"#fff",
              fontFamily:"'Nunito',sans-serif",boxShadow:`0 8px 28px ${meta.ac}50`}}>Nueva inscripción</button>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{minHeight:"100vh",background:BG,overflowX:"hidden",fontFamily:"'Nunito',sans-serif"}}>
      <style>{CSS}</style>
      {/* navbar negro */}
      <div style={{background:DK,position:"sticky",top:0,zIndex:50,
        borderBottom:"1px solid rgba(255,255,255,0.07)",
        boxShadow:"0 2px 24px rgba(0,0,0,0.5)"}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",alignItems:"center",gap:14,height:58,padding:"0 24px"}}>
          <button onClick={onBack}
            style={{background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,255,255,0.1)",
              color:"rgba(255,255,255,0.4)",cursor:"pointer",width:38,height:38,borderRadius:12,
              fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",
              flexShrink:0,transition:"all .18s",fontFamily:"'Nunito',sans-serif"}}
            onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.14)";e.currentTarget.style.color="#fff";}}
            onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.07)";e.currentTarget.style.color="rgba(255,255,255,0.4)";}}>←</button>
          <Logo h={22} light/>
          <div style={{flex:1,minWidth:0,marginLeft:4}}>
            <div style={{fontSize:14,fontWeight:900,color:"#fff",display:"flex",alignItems:"center",gap:9,flexWrap:"wrap",letterSpacing:"-0.01em"}}>
              {meta.title}
              {meta.badge&&<span style={{background:meta.ac,color:"#fff",fontSize:10,padding:"3px 10px",borderRadius:8,fontWeight:900,boxShadow:`0 2px 8px ${meta.ac}50`}}>{meta.badge}</span>}
            </div>
          </div>
          <span style={{fontSize:11,color:"rgba(255,255,255,0.2)",fontWeight:900,flexShrink:0}}>{step+1} / {steps.length}</span>
        </div>
      </div>
      {/* barra progreso naranja */}
      <div style={{height:3,background:"#ede9e2"}}>
        <div style={{height:"100%",background:meta.gr,width:`${pct}%`,transition:"width .5s cubic-bezier(.4,0,.2,1)",boxShadow:`0 0 10px ${meta.ac}80`}}/>
      </div>
      {/* tabs */}
      <div className="wiz-tabs" style={{background:"#fff",borderBottom:"1.5px solid #ede9e2",padding:"10px 24px",display:"flex",gap:6,overflowX:"auto",boxShadow:"0 2px 10px rgba(0,0,0,0.04)"}}>
        {steps.map((st,i)=>(
          <button key={st} onClick={()=>i<=step&&setStep(i)}
            style={{padding:"7px 15px",borderRadius:24,fontSize:11,fontWeight:900,border:"none",
              cursor:i<=step?"pointer":"default",whiteSpace:"nowrap",flexShrink:0,
              transition:"all .2s",fontFamily:"'Nunito',sans-serif",letterSpacing:"0.04em",
              background:i===step?meta.ac:i<step?`${meta.ac}15`:BG,
              color:i===step?"#fff":i<step?meta.ac:"#ccc",
              boxShadow:i===step?`0 4px 14px ${meta.ac}45`:"none"}}>
            {i<step?"✓ ":""}{st}
          </button>
        ))}
      </div>
      {/* contenido */}
      <div className="wiz-body" style={{maxWidth:800,margin:"0 auto",padding:"28px 24px 140px"}}>
        <Paso type={type} step={step} d={data} s={set} ac={meta.ac}/>
      </div>
      {/* nav inferior */}
      <div className="wiz-foot" style={{position:"fixed",bottom:0,left:0,right:0,zIndex:40,
        background:"rgba(247,245,242,0.97)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",
        borderTop:"1.5px solid #ede9e2",padding:"14px 24px",
        boxShadow:"0 -8px 40px rgba(0,0,0,0.07)"}}>
        <div style={{maxWidth:800,margin:"0 auto",display:"flex",gap:12}}>
          <button className="shimmer" onClick={step===0?onBack:()=>setStep(s=>s-1)}
            style={{padding:"15px 24px",borderRadius:14,fontSize:14,fontWeight:800,cursor:"pointer",
              border:"1.5px solid #dedad2",background:"#fff",color:"#666",flexShrink:0,
              fontFamily:"'Nunito',sans-serif",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
            {step===0?"← Portal":"← Atrás"}
          </button>
          {!isLast
            ?<button className="shimmer" onClick={()=>setStep(s=>s+1)}
                style={{padding:"15px 0",borderRadius:14,fontSize:14,fontWeight:900,cursor:"pointer",
                  border:"none",background:meta.gr,color:"#fff",flex:1,
                  fontFamily:"'Nunito',sans-serif",boxShadow:`0 8px 28px ${meta.ac}45`}}>
                Siguiente →
              </button>
            :<button className="shimmer" onClick={handleSubmit} disabled={sending}
                style={{padding:"15px 0",borderRadius:14,fontSize:14,fontWeight:900,
                  cursor:sending?"wait":"pointer",border:"none",flex:1,color:"#fff",
                  background:sending?"#aaa":meta.gr,fontFamily:"'Nunito',sans-serif",
                  boxShadow:sending?"none":`0 8px 28px ${meta.ac}45`,
                  display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                {sending?"Enviando...":"Finalizar inscripcion"}
              </button>}
          {sendErr?<div style={{textAlign:"center",marginTop:8,fontSize:12,color:"#dc2626",fontWeight:700}}>{sendErr}</div>:null}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [view,setView]=useState("portal");
  const [type,setType]=useState(null);
  if(view==="form"&&type)return <Wizard type={type} onBack={()=>{setView("portal");setType(null);}}/>;
  return <Portal onSelect={t=>{setType(t);setView("form");}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
